// ================================================================

function dcShowToast(text) {
    DC.toast.textContent = text;
    DC.toast.classList.add('show');
    clearTimeout(DC.toast._timer);
    DC.toast._timer = setTimeout(() => DC.toast.classList.remove('show'), 2000);
}

// ================================================================
// ======  ВХОД ПОЛЬЗОВАТЕЛЯ  ======
// ================================================================
function dcLoginUser() {
    const saved = localStorage.getItem('dc_user_' + DC_SITE_ID);
    if (saved) {
        DC_USER = saved;
        DC.userName.textContent = '👤 ' + DC_USER;
        return true;
    }
    const nick = prompt('Введите ваше имя:');
    if (nick && nick.trim()) {
        DC_USER = nick.trim();
        if (DC_USER.length > 24) { alert('Слишком длинное имя'); return dcLoginUser(); }
        localStorage.setItem('dc_user_' + DC_SITE_ID, DC_USER);
        DC.userName.textContent = '👤 ' + DC_USER;
        return true;
    }
    return false;
}

// ================================================================
// ======  ГЕНЕРАЦИЯ ФРЕЙМА ДЛЯ ССЫЛКИ ======
// ================================================================

function dcGenerateLinkFrame(url) {
    // Экранируем URL для безопасной вставки
    const safeUrl = url.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    const domain = new URL(url).hostname;
    
    return `
        <div class="dc-link-frame">
            <div class="dc-frame-header">
                <span class="dc-frame-url">🔗 ${domain}</span>
                <a class="dc-frame-open" href="${safeUrl}" target="_blank" rel="noopener noreferrer">↗ Открыть</a>
            </div>
            <iframe src="${safeUrl}" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
        </div>
    `;
}

// ================================================================
// ======  ОБРАБОТКА ТЕКСТА (ССЫЛКИ → ФРЕЙМЫ) ======
// ================================================================

function dcProcessTextWithFrames(text) {
    if (!text) return '';
    
    // Находим все ссылки в тексте
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    const matches = text.match(urlRegex);
    
    if (!matches) return text;
    
    let result = text;
    matches.forEach(url => {
        // Создаём фрейм для каждой ссылки
        const frameHtml = dcGenerateLinkFrame(url);
        // Заменяем ссылку на фрейм
        result = result.replace(url, frameHtml);
    });
    
    return result;
}

// ================================================================
// ======  ВСТАВКА HTML  ======
// ================================================================
function dcInsertHTML(type) {
    const textarea = DC.postContent;
    let html = '';
    switch(type) {
        case 'marquee':
            html = '<div class="dc-marquee"><span>🔥 Ваше объявление здесь! 🔥</span></div>';
            break;
        case 'image':
            const imgUrl = prompt('Введите URL картинки:');
            if (!imgUrl) return;
            html = `<img src="${imgUrl}" alt="Картинка">`;
            break;
        case 'video':
            const vidUrl = prompt('Введите URL видео:');
            if (!vidUrl) return;
            html = `<video controls><source src="${vidUrl}" type="video/mp4"></video>`;
            break;
        case 'youtube':
            const ytId = prompt('Введите ID видео YouTube:');
            if (!ytId) return;
            html = `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${ytId}" frameborder="0" allowfullscreen></iframe>`;
            break;
        case 'link':
            const linkUrl = prompt('Введите URL ссылки:');
            if (!linkUrl) return;
            html = dcGenerateLinkFrame(linkUrl);
            break;
        default: return;
    }
    textarea.value += '\n[html]' + html + '[/html]\n';
    textarea.focus();
}

function dcOpenNewPost() {
    DC_EDITING_POST = null;
    DC.postModalTitle.textContent = '📝 Новый пост';
    DC.postModalSub.textContent = 'Заголовок и содержание';
    DC.postTitle.value = '';
    DC.postContent.value = '';
    DC.postModal.classList.add('open');
    DC.postTitle.focus();
}

function dcOpenEditPost(postId) {
    DC_EDITING_POST = postId;
    DC.postModalTitle.textContent = '✏️ Редактировать пост';
    DC.postModalSub.textContent = 'Измените заголовок или текст';
    const ref = DC_DB.ref(DC_PATH + '/posts/' + postId);
    ref.once('value', (snap) => {
        const data = snap.val();
        if (data) {
            DC.postTitle.value = data.title || '';
            DC.postContent.value = data.content || '';
            DC.postModal.classList.add('open');
            DC.postTitle.focus();
        }
    });
}

function dcSavePost() {
    const title = DC.postTitle.value.trim();
    let content = DC.postContent.value.trim();
    if (!title && !content) { dcShowToast('⚠️ Заполните заголовок или текст'); return; }

    if (content.includes('[html]') && content.includes('[/html]')) {
        const parts = content.split(/\[html\]|\[\/html\]/);
        let finalHtml = '';
        for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 0) {
                finalHtml += parts[i];
            } else {
                finalHtml += `<div class="dc-html-content">${parts[i]}</div>`;
            }
        }
        content = finalHtml;
    }

    const post = {
        author: DC_USER,
        title: title || 'Без заголовка',
        content: content || '📝 Новый пост',
        timestamp: Date.now(),
        likes: 0,
        comments: {},
        order: Date.now()
    };

    if (DC_EDITING_POST) {
        DC_DB.ref(DC_PATH + '/posts/' + DC_EDITING_POST).update(post)
            .then(() => { dcClosePostModal(); dcShowToast('✅ Пост обновлён!'); })
            .catch(err => dcShowToast('❌ ' + err.message));
    } else {
        DC_DB.ref(DC_PATH + '/posts').push(post)
            .then(() => { dcClosePostModal(); dcShowToast('✅ Пост опубликован!'); })
            .catch(err => dcShowToast('❌ ' + err.message));
    }
}

function dcDeletePost(postId) {
    if (!confirm('Удалить пост?')) return;
    DC_DB.ref(DC_PATH + '/posts/' + postId).remove()
        .then(() => dcShowToast('🗑️ Пост удалён'))
        .catch(err => dcShowToast('❌ ' + err.message));
}

function dcAddComment(postId) {
    const input = document.getElementById('dc-comment-input-' + postId);
    let text = input.value.trim();
    if (!text) { dcShowToast('⚠️ Напишите комментарий'); return; }

    // Обрабатываем ссылки в комментарии (превращаем в фреймы)
    const processedText = dcProcessTextWithFrames(text);

    const comment = {
        author: DC_USER,
        text: processedText,
        timestamp: Date.now(),
        likes: 0
    };

    DC_DB.ref(DC_PATH + '/posts/' + postId + '/comments').push(comment)
        .then(() => {
            input.value = '';
            dcShowToast('💬 Комментарий добавлен!');
        })
        .catch(err => dcShowToast('❌ ' + err.message));
}

function dcOpenEditComment(postId, commentId) {
    DC_EDITING_COMMENT = { postId, commentId };
    const ref = DC_DB.ref(DC_PATH + '/posts/' + postId + '/comments/' + commentId);
    ref.once('value', (snap) => {
        const data = snap.val();
        if (data) {
            DC.commentEditInput.value = data.text || '';
            DC.commentModal.classList.add('open');
            DC.commentEditInput.focus();
        }
    });
}

function dcSaveComment() {
    if (!DC_EDITING_COMMENT) return;
    let text = DC.commentEditInput.value.trim();
    if (!text) { dcShowToast('⚠️ Напишите текст'); return; }
    
    const processedText = dcProcessTextWithFrames(text);
    const { postId, commentId } = DC_EDITING_COMMENT;
    DC_DB.ref(DC_PATH + '/posts/' + postId + '/comments/' + commentId).update({ text: processedText })
        .then(() => {
            dcCloseCommentModal();
            dcShowToast('✅ Комментарий обновлён!');
        })
        .catch(err => dcShowToast('❌ ' + err.message));
}

function dcDeleteComment(postId, commentId) {
    if (!confirm('Удалить комментарий?')) return;
    DC_DB.ref(DC_PATH + '/posts/' + postId + '/comments/' + commentId).remove()
        .then(() => dcShowToast('🗑️ Комментарий удалён'))
        .catch(err => dcShowToast('❌ ' + err.message));
}

function dcLikeComment(postId, commentId, amount) {
    if (!DC_IS_ADMIN && amount > 1) {
        dcShowToast('⛔ Только админ может ставить много лайков!');
        return;
    }
    const ref = DC_DB.ref(DC_PATH + '/posts/' + postId + '/comments/' + commentId + '/likes');
    ref.transaction((current) => {
        return (current || 0) + amount;
    });
    if (amount === 1) dcShowToast('❤️ +1 лайк на комментарий!');
    else dcShowToast('🔥 +' + amount + ' лайков!');
}

function dcCommentPhoto(postId) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) { dcShowToast('⚠️ Максимум 2MB'); return; }
        const reader = new FileReader();
        reader.onload = function(ev) {
            const comment = {
                author: DC_USER,
                text: '📸 Фото',
                img: ev.target.result,
                timestamp: Date.now(),
                likes: 0
            };
            DC_DB.ref(DC_PATH + '/posts/' + postId + '/comments').push(comment)
                .then(() => dcShowToast('📸 Фото в комментарии!'))
                .catch(err => dcShowToast('❌ ' + err.message));
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

function dcFocusComment(postId) {
    const input = document.getElementById('dc-comment-input-' + postId);
    if (input) {
        input.focus();
        input.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function dcRenderComment(postId, commentId, cm) {
    const isCmOwn = (cm.author === DC_USER);
    const canCmEdit = isCmOwn || DC_IS_ADMIN;
    const canCmDelete = DC_IS_ADMIN || isCmOwn;
    let cmImgHtml = '';
    if (cm.img) {
        cmImgHtml = `<img class="dc-cimg" src="${cm.img}" onclick="window.open(this.src)">`;
    }
    
    return `
        <div class="dc-comment">
            <div class="dc-cname" onclick="dcOpenProfile('${cm.author}')">${cm.author}</div>
            <div class="dc-ctext">${cm.text || ''}</div>
            ${cmImgHtml}
            <div class="dc-ctime">${new Date(cm.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
            <div class="dc-c-actions">
                <button class="dc-clike" onclick="dcLikeComment('${postId}','${commentId}',1)">❤️ ${cm.likes || 0}</button>
                ${DC_IS_ADMIN ? `<button class="dc-clike" onclick="dcLikeComment('${postId}','${commentId}',10)">+10</button>` : ''}
                ${canCmEdit ? `<button class="dc-cedit" onclick="dcOpenEditComment('${postId}','${commentId}')">✏️</button>` : ''}
                ${canCmDelete ? `<button class="dc-cdel" onclick="dcDeleteComment('${postId}','${commentId}')">🗑</button>` : ''}
            </div>
        </div>
    `;
}

// ================================================================
// ======  ЗАГРУЗКА ПОСТОВ  ======
// ================================================================
function dcLoadPosts() {
    DC_DB.ref(DC_PATH + '/posts').orderByChild('order').on('value', (snap) => {
        const data = snap.val() || {};
        const keys = Object.keys(data).sort((a, b) => (data[a].order || 0) - (data[b].order || 0));

        if (keys.length === 0) {
            DC.feed.innerHTML = '<div class="dc-empty">💬 Нет постов. Создайте первый!</div>';
            return;
        }

        let html = '';
        keys.forEach(key => {
            const post = data[key];
            const isOwn = (post.author === DC_USER);
            const canEdit = isOwn || DC_IS_ADMIN;
            const canDelete = DC_IS_ADMIN || isOwn;
            const likes = post.likes || 0;
            const comments = post.comments || {};
            const commentKeys = Object.keys(comments);
            const commentCount = commentKeys.length;

            let commentsHtml = '';
            commentKeys.forEach(ck => {
                const cm = comments[ck];
                commentsHtml += dcRenderComment(key, ck, cm);
            });

            html += `
                <div class="dc-post" id="dc-post-${key}">
                    <div class="dc-post-header">
                        <div>
                            <span class="dc-post-author" onclick="dcOpenProfile('${post.author}')">${post.author}</span>
                            <span class="dc-post-time">${new Date(post.timestamp).toLocaleString([], {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                        <div class="dc-post-menu">
                            <button class="dc-menu-btn" onclick="event.stopPropagation(); dcToggleMenu('${key}')">⋯</button>
                            <div class="dc-menu-dropdown" id="dc-menu-${key}">
                                ${canEdit ? `<button class="dc-menu-edit" onclick="dcOpenEditPost('${key}')">✏️ Редактировать</button>` : ''}
                                ${canDelete ? `<button class="dc-menu-delete" onclick="dcDeletePost('${key}')">🗑 Удалить</button>` : ''}
                                ${DC_IS_ADMIN ? `<button onclick="dcMovePost('${key}', -1)">⬆ Вверх</button>` : ''}
                                ${DC_IS_ADMIN ? `<button onclick="dcMovePost('${key}', 1)">⬇ Вниз</button>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="dc-post-title">${post.title}</div>
                    <div class="dc-post-content">${post.content}</div>
                    <div class="dc-post-stats">
                        <span>❤️ ${likes}</span>
                        <span>💬 ${commentCount}</span>
                    </div>
                    <div class="dc-post-buttons">
                        <button class="dc-btn-like" onclick="dcLikePost('${key}',1)">❤️ Лайк</button>
                        ${DC_IS_ADMIN ? `<button class="dc-btn-like" onclick="dcLikePost('${key}',10)" style="color:#ffcc66;">+10</button>` : ''}
                        ${DC_IS_ADMIN ? `<button class="dc-btn-like" onclick="dcLikePost('${key}',100)" style="color:#ff8c00;">+100</button>` : ''}
                        <button class="dc-btn-comment" onclick="dcFocusComment('${key}')">💬 Коммент</button>
                        <button class="dc-btn-repost" onclick="dcRepost('${key}', '${post.title.replace(/'/g, "\\'")}')">🔄 Репост</button>
                        <button class="dc-btn-html" onclick="dcAddHTMLToPost('${key}')">📦 HTML</button>
                    </div>
                    <div class="dc-comments" id="dc-comments-${key}">
                        ${commentsHtml}
                    </div>
                    <div class="dc-comment-input">
                        <input type="text" id="dc-comment-input-${key}" placeholder="Напишите комментарий...">
                        <button onclick="dcAddComment('${key}')">➤</button>
                        <button class="dc-cfile" onclick="dcCommentPhoto('${key}')">🖼️</button>
                    </div>
                </div>
            `;
        });
        DC.feed.innerHTML = html;
        DC.feed.scrollTop = DC.feed.scrollHeight;
    });
}

// ================================================================
// ======  АДМИН-ФУНКЦИИ  ======
// ================================================================
function dcAdminLikeAll(amount) {
    if (!DC_IS_ADMIN) { dcShowToast('⛔ Только для админа!'); return; }
    DC_DB.ref(DC_PATH + '/posts').once('value', (snap) => {
        const posts = snap.val() || {};
        Object.keys(posts).forEach(key => {
            const ref = DC_DB.ref(DC_PATH + '/posts/' + key + '/likes');
            ref.transaction((current) => {
                return (current || 0) + amount;
            });
        });
        dcShowToast('🔥 +' + amount + ' лайков всем постам!');
    });
}

function dcAdminDeleteAll() {
    if (!DC_IS_ADMIN) { dcShowToast('⛔ Только для админа!'); return; }
    if (!confirm('🗑️ УДАЛИТЬ ВСЕ ПОСТЫ И КОММЕНТАРИИ? Это безвозвратно!')) return;
    DC_DB.ref(DC_PATH + '/posts').remove()
        .then(() => dcShowToast('🗑️ Все посты удалены!'))
        .catch(err => dcShowToast('❌ ' + err.message));
}

// ================================================================
// ======  АДМИНКА  ======
// ================================================================
function dcOpenAdmin() {
    DC.adminModal.classList.add('open');
    DC.adminPass.value = '';
    DC.adminPass.focus();
}
function dcCloseAdmin() { DC.adminModal.classList.remove('open'); }

function dcAdminLogin() {
    const pass = DC.adminPass.value.trim();
    if (pass === '12345') {
        DC_IS_ADMIN = true;
        localStorage.setItem('dc_admin_' + DC_SITE_ID, 'true');
        DC.adminPanel.classList.add('show');
        dcCloseAdmin();
        dcShowToast('🏴‍☠️ Админ-режим включён!');
    } else {
        dcShowToast('❌ Неверный пароль!');
        DC.adminPass.value = '';
        DC.adminPass.focus();
    }
}

function dcAdminLogout() {
    DC_IS_ADMIN = false;
    localStorage.removeItem('dc_admin_' + DC_SITE_ID);
    DC.adminPanel.classList.remove('show');
    dcShowToast('🔒 Вы вышли из админки');
}

// ================================================================
// ======  МОДАЛКИ  ======
// ================================================================
function dcClosePostModal() { DC.postModal.classList.remove('open'); }
function dcCloseCommentModal() { DC.commentModal.classList.remove('open'); }
function dcCloseProfile() { DC.profileModal.classList.remove('open'); }

// ================================================================
// ======  ЗАПУСК  ======
// ================================================================
document.addEventListener('DOMContentLoaded', function() {
    if (!dcLoginUser()) {
        setTimeout(() => dcLoginUser(), 300);
    }

    if (localStorage.getItem('dc_admin_' + DC_SITE_ID) === 'true') {
        DC_IS_ADMIN = true;
        DC.adminPanel.classList.add('show');
    }

    [DC.postModal, DC.commentModal, DC.profileModal, DC.adminModal].forEach(el => {
        el.addEventListener('click', function(e) {
            if (e.target === el) {
                el.classList.remove('open');
            }
        });
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const target = e.target;
            if (target && target.id && target.id.startsWith('dc-comment-input-')) {
                const postId = target.id.replace('dc-comment-input-', '');
                dcAddComment(postId);
            }
        }
    });

    dcLoadPosts();

    console.log('💬 DeepSocial 7.0 — Фреймы по ссылкам!');
    console.log('🏷️ Сайт:', DC_SITE_ID);
    console.log('👤 Пользователь:', DC_USER || 'не выбран');
    console.log('🏴‍☠️ Админ-пароль: 12345');
    console.log('📌 Ссылки в комментариях превращаются в полноценные фреймы!');
});
</script>
